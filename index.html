<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenfix - 赛博时代的数字求签</title>
  <link rel="stylesheet" href="style.css?v=20260313-1435">
  <script>
  // 在app.js加载前就定义空函数（手机端）
  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    window.playBellSound = function() {};
  }
  </script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">ZENFIX</h1>
      <p class="subtitle">赛博时代的数字求签</p>
    </header>

    <main class="main">
      <section id="step-persona" class="step active">
        <h2>选择你的AI人格</h2>
        <div id="persona-list" class="card-grid"></div>
      </section>

      <section id="step-category" class="step">
        <h2>选择你关心的类别</h2>
        <div id="category-list" class="card-grid"></div>
      </section>

      <section id="step-meditation-prepare" class="step">
        <h2>量子态初始化</h2>
        <div class="meditation-box">
          <p class="meditation-text">你的困惑正处于量子叠加态...</p>
          <p class="meditation-text">观测即坍缩，答案即将显现...</p>
          <p class="meditation-text">深呼吸，准备接收...</p>
        </div>
      </section>

      <section id="step-meditation" class="step">
        <h2>冥想</h2>
        <div class="meditation-box">
          <div class="countdown"></div>
        </div>
      </section>

      <section id="step-result" class="step">
        <h2>你的签文</h2>
        <div class="result-box">
          <div id="interpretation" class="interpretation"></div>
          <button id="btn-restart" class="btn">再抽一次</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
