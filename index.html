<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenfix - 赛博时代的数字求签</title>
  <link rel="stylesheet" href="style.css?v=20260312-2025">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">ZENFIX</h1>
      <p class="subtitle">赛博时代的数字求签</p>
    </header>

    <main class="main">
      <section id="step-persona" class="step active">
        <h2>选择你的AI人格</h2>
        <div id="persona-list" class="card-grid"></div>
      </section>

      <section id="step-category" class="step">
        <h2>选择你关心的类别</h2>
        <div id="category-list" class="card-grid"></div>
      </section>

      <section id="step-meditation-prepare" class="step">
        <h2>冥想</h2>
        <div class="meditation-box">
          <p class="meditation-text">请闭上眼睛...</p>
          <p class="meditation-text">在心中默念你的困惑...</p>
          <p class="meditation-text">深呼吸...</p>
        </div>
      </section>

      <section id="step-meditation" class="step">
        <h2>冥想</h2>
        <div class="meditation-box">
          <div class="countdown"></div>
        </div>
      </section>

      <section id="step-result" class="step">
        <h2>你的签文</h2>
        <div class="result-box">
          <div id="interpretation" class="interpretation"></div>
          <button id="btn-restart" class="btn">再抽一次</button>
        </div>
      </section>
    </main>
  </div>

  <script>
  // 移动端音频修复 - 在app.js加载前执行
  (function() {
    let globalAudioContext = null;
    let bellSoundCount = 0;
    
    // 创建全局AudioContext
    function initAudioContext() {
      if (globalAudioContext) return globalAudioContext;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        globalAudioContext = new AC();
        if (globalAudioContext.state === 'suspended') {
          globalAudioContext.resume();
        }
      }
      return globalAudioContext;
    }
    
    // 在任何用户交互时初始化并恢复AudioContext
    function unlockAudio() {
      const ctx = initAudioContext();
      if (ctx && ctx.state === 'suspended') {
        ctx.resume();
      }
    }
    
    // 监听所有可能的用户交互
    ['touchstart', 'touchend', 'click', 'keydown'].forEach(event => {
      document.addEventListener(event, unlockAudio, { passive: true });
    });
    
    // 页面可见性变化时恢复
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden && globalAudioContext && globalAudioContext.state === 'suspended') {
        globalAudioContext.resume();
      }
    });
    
    // 立即初始化
    initAudioContext();
    
    // 立即替换playBellSound
    let sustainedBellPlaying = false;
    
    window.playBellSound = function() {
      if (!sustainedBellPlaying) {
        sustainedBellPlaying = true;
        playSustainedBell();
        setTimeout(() => { sustainedBellPlaying = false; }, 6000);
      }
    };
    
    function playSustainedBell() {
      const ctx = globalAudioContext;
      if (!ctx) return;
      
      const now = ctx.currentTime;
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      
      oscillator.frequency.setValueAtTime(432, now);
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.1, now + 0.5);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 6);
      
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      
      oscillator.start(now);
      oscillator.stop(now + 6);
    }
  })();
  </script>
  
  <script src="app.js"></script>
</body>
</html>
